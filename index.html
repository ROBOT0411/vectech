    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        // з§»йҷӨжЁЎжқҝеӯ—дёІзҡ„еӮізөұеҜ«жі•пјҢйҳІжӯўиЁҳдәӢжң¬з ҙеЈһзЁӢејҸзўј
        const Icon = ({ name, size=24, className="" }) => <i className={"ph " + name + " " + className} style={{ fontSize: size }}></i>;
        const Activity = p => <Icon name="ph-activity" {...p} />;
        const Layers = p => <Icon name="ph-stack" {...p} />;
        const UserCircle = p => <Icon name="ph-user-circle" {...p} />;
        const Briefcase = p => <Icon name="ph-briefcase" {...p} />;
        const Lock = p => <Icon name="ph-lock" {...p} />;
        const ArrowRight = p => <Icon name="ph-arrow-right" {...p} />;
        const ShieldCheck = p => <Icon name="ph-shield-check" {...p} />;
        const FilePlus = p => <Icon name="ph-file-plus" {...p} />;
        const Home = p => <Icon name="ph-house" {...p} />;
        const BarChart3 = p => <Icon name="ph-chart-bar" {...p} />;
        const TrendingUp = p => <Icon name="ph-trend-up" {...p} />;
        const TableIcon = p => <Icon name="ph-table" {...p} />;
        const Settings = p => <Icon name="ph-gear" {...p} />;
        const LogOut = p => <Icon name="ph-sign-out" {...p} />;
        const Database = p => <Icon name="ph-database" {...p} />;
        const Wifi = p => <Icon name="ph-wifi-high" {...p} />;
        const CheckCircle = p => <Icon name="ph-check-circle" {...p} />;
        const CalendarDays = p => <Icon name="ph-calendar-blank" {...p} />;
        const Check = p => <Icon name="ph-check" {...p} />;
        const FileSpreadsheet = p => <Icon name="ph-file-csv" {...p} />;
        const Trash2 = p => <Icon name="ph-trash" {...p} />;
        const AlertTriangle = p => <Icon name="ph-warning" {...p} />;
        const UserPlus = p => <Icon name="ph-user-plus" {...p} />;
        const Printer = p => <Icon name="ph-printer" {...p} />;
        const KeyRound = p => <Icon name="ph-key" {...p} />;

        const firebaseConfig = {
            apiKey: "AIzaSyDrVI2lIVebjunYgIoYOmQp1Kh2kngXzW8",
            authDomain: "robot-ai-d531d.firebaseapp.com",
            projectId: "robot-ai-d531d",
            storageBucket: "robot-ai-d531d.firebasestorage.app",
            messagingSenderId: "499127775198",
            appId: "1:499127775198:web:da8ef20a9a759dc767f74f",
            measurementId: "G-XH8K1GWB5F"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const defaultSalesTargets = { ALSTON: 5, ALEX: 5, CHRIS: 3, HANK: 2 };

        function App() {
            const [appMode, setAppMode] = useState('landing'); 
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isLoading, setIsLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState('');
            const [cloudStatus, setCloudStatus] = useState('йҖЈз·ҡдёӯ...');

            const [cases, setCases] = useState([]);
            const [salesTargets, setSalesTargets] = useState(defaultSalesTargets);
            const [adminPassword, setAdminPassword] = useState('8888');

            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [newPasswordInput, setNewPasswordInput] = useState('');
            const [newSalesName, setNewSalesName] = useState('');
            const [newSalesTarget, setNewSalesTarget] = useState(3);
            const [showClearConfirm, setShowClearConfirm] = useState(false);
            const [exportMonth, setExportMonth] = useState('all');
            const [viewMonth, setViewMonth] = useState(new Date().getMonth() + 1);

            useEffect(() => {
                setCloudStatus('и®ҖеҸ–иіҮж–ҷеә«дёӯ...');
                auth.signInAnonymously().catch(function() { console.log("еҢҝеҗҚзҷ»е…Ҙз•ҘйҒҺпјҢеј·еҲ¶дҪҝз”ЁиҰҸеүҮзӣҙйҖЈ"); });

                const docRef = db.collection('salesSystem').doc('mainData');
                
                const unsubscribeDB = docRef.onSnapshot(function(docSnap) {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        setCases(data.cases || []);
                        setSalesTargets(data.salesTargets || defaultSalesTargets);
                        setAdminPassword(data.adminPassword || '8888');
                    } else {
                        docRef.set({ cases: [], salesTargets: defaultSalesTargets, adminPassword: '8888' });
                    }
                    setCloudStatus('рҹҹў йӣІз«Ҝе·ІеҗҢжӯҘ (ver.06)');
                    setIsLoading(false);
                }, function(err) {
                    console.error("Listen Error:", err);
                    setErrorMsg("иіҮж–ҷеә«еӯҳеҸ–иў«жӢ’зө•пјҒвқҢ\nи«ӢеӢҷеҝ…еҲ° Firebase -> Firestore Database -> иҰҸеүҮ (Rules)пјҢе°ҮзЁӢејҸзўјж”№жҲҗ allow read, write: if true;");
                    setIsLoading(false);
                });

                return function() { unsubscribeDB(); };
            }, []);

            const syncToCloud = async function(newData) {
                setCloudStatus('вҸі еҜ«е…ҘйӣІз«Ҝдёӯ...');
                try {
                    const docRef = db.collection('salesSystem').doc('mainData');
                    await docRef.set(newData, { merge: true });
                    setCloudStatus('рҹҹў йӣІз«Ҝе·ІеҗҢжӯҘ (ver.06)');
                    return true;
                } catch (err) {
                    console.error("Write Error:", err);
                    alert("вқҢ еҜ«е…ҘеӨұж•—пјҒиў«иіҮж–ҷеә«йҳ»ж“ӢгҖӮ\nйҢҜиӘӨиЁҠжҒҜпјҡ" + err.message + "\nрҹ‘ү и«ӢжӘўжҹҘ Firebase зҡ„гҖҢиҰҸеүҮ (Rules)гҖҚжҳҜеҗҰе·Іж”№жҲҗ if true;");
                    setCloudStatus('рҹ”ҙ еҜ«е…ҘеӨұж•—');
                    return false;
                }
            };

            const stats = useMemo(function() {
                const summary = { total: cases.length, tracking: 0, tested: 0, closed: 0 };
                const annualKpiMatrix = {};
                const monthlyTotal = Array(12).fill(0);
                const monthlyStats = {};

                Object.keys(salesTargets).forEach(function(s) { annualKpiMatrix[s] = Array(12).fill(0); });

                cases.forEach(function(c) {
                    if (c.status === 'иҝҪи№Өдёӯ') summary.tracking++;
                    if (c.status === 'е·Іи©ҰеҒҡ') summary.tested++;
                    if (c.status === 'е·ІжҲҗдәӨ') summary.closed++;

                    if (c.month >= 1 && c.month <= 12) {
                        monthlyTotal[c.month - 1]++;
                        if ((c.status === 'е·Іи©ҰеҒҡ' || c.status === 'е·ІжҲҗдәӨ') && annualKpiMatrix[c.sales]) {
                            annualKpiMatrix[c.sales][c.month - 1]++;
                        }
                    }

                    if (!monthlyStats[c.month]) {
                        monthlyStats[c.month] = {};
                        Object.keys(salesTargets).forEach(function(s) { monthlyStats[c.month][s] = { total: 0, done: 0 }; });
                    }
                    if (monthlyStats[c.month][c.sales]) {
                        monthlyStats[c.month][c.sales].total++;
                        if (c.status === 'е·Іи©ҰеҒҡ' || c.status === 'е·ІжҲҗдәӨ') monthlyStats[c.month][c.sales].done++;
                    }
                });

                return { summary: summary, annualKpiMatrix: annualKpiMatrix, monthlyTotal: monthlyTotal, monthlyStats: monthlyStats };
            }, [cases, salesTargets]);

            const handleManagerLogin = function(e) {
                e.preventDefault();
                if (passwordInput === adminPassword) {
                    setAppMode('manager');
                    setActiveTab('dashboard');
                    setLoginError(false);
                    setPasswordInput('');
                } else {
                    setLoginError(true);
                }
            };

            const handleAddCase = async function(e) {
                e.preventDefault();
                try {
                    const fd = new FormData(e.target);
                    const sales = fd.get('sales');
                    const clientVal = fd.get('client');
                    const equipmentVal = fd.get('equipment');
                    const client = clientVal ? clientVal.trim() : '';
                    const equipment = equipmentVal ? equipmentVal.trim() : '';
                    const date = fd.get('date');
                    const status = fd.get('status');

                    if (!sales) return alert('вҡ пёҸ и«ӢйҒёж“ҮиІ иІ¬жҘӯеӢҷпјҒ');
                    if (!client) return alert('вҡ пёҸ и«Ӣијёе…Ҙе®ўжҲ¶еҗҚзЁұпјҒ');
                    if (!date) return alert('вҡ пёҸ и«ӢйҒёж“Үи©ҰеҒҡж—ҘжңҹпјҒ');
                    if (!equipment) return alert('вҡ пёҸ и«Ӣијёе…ҘиЁӯеӮҷ/з”ўе“ҒеһӢиҷҹпјҒ');

                    const month = parseInt(date.split('-')[1], 10) || new Date().getMonth() + 1;

                    const newCase = {
                        id: cases.length > 0 ? Math.max.apply(Math, cases.map(function(c) { return c.id; })) + 1 : 1,
                        sales: sales, client: client, equipment: equipment, date: date, status: status,
                        result: fd.get('result') || '',
                        month: month,
                        createAt: Date.now()
                    };

                    const updatedCases = [...cases, newCase];
                    const isSuccess = await syncToCloud({ cases: updatedCases });
                    
                    if (isSuccess) {
                        e.target.reset();
                        alert('вңЁ жЎҲд»¶е·ІжҲҗеҠҹеҜ«е…ҘйӣІз«Ҝзі»зөұпјҒ');
                        if (appMode === 'manager') setActiveTab('data');
                    }
                } catch (error) {
                    alert('вҡ пёҸ зі»зөұзҷјз”ҹйҢҜиӘӨпјҡ' + error.message);
                }
            };

            const handleSaveNewPassword = async function() {
                const p = newPasswordInput.trim();
                if (!p) return alert('вҡ пёҸ еҜҶзўјдёҚиғҪзӮәз©әзҷҪпјҒ');
                const isSuccess = await syncToCloud({ adminPassword: p });
                if (isSuccess) {
                    setShowSettingsModal(false);
                    setNewPasswordInput('');
                    alert('вң… з®ЎзҗҶеҜҶзўје·Іи®ҠжӣҙпјҢзі»зөұе°ҮзӮәжӮЁзҷ»еҮәгҖӮ');
                    setAppMode('manager_auth');
                }
            };

            const handleAddSales = async function() {
                const name = newSalesName.trim().toUpperCase();
                if (!name) return alert('вҡ пёҸ и«Ӣијёе…ҘжҘӯеӢҷе§“еҗҚпјҒ');
                if (salesTargets[name]) return alert('вҡ пёҸ жӯӨжҘӯеӢҷе·ІеӯҳеңЁпјҒ');
                const newTargets = Object.assign({}, salesTargets);
                newTargets[name] = parseInt(newSalesTarget, 10) || 1;
                
                const isSuccess = await syncToCloud({ salesTargets: newTargets });
                if (isSuccess) {
                    setNewSalesName('');
                    alert("вң… е·Іж–°еўһжҘӯеӢҷпјҡ" + name);
                }
            };

            const handleExportExcel = function() {
                let list = exportMonth === 'all' ? cases : cases.filter(function(c) { return c.month === parseInt(exportMonth, 10); });
                if (list.length === 0) return alert('жӯӨжңҲд»Ҫз„ЎиіҮж–ҷеҸҜеҢҜеҮә');

                const BOM = '\uFEFF';
                const header = "жңҲд»Ҫ,жҘӯеӢҷ,е®ўжҲ¶,иЁӯеӮҷ,ж—Ҙжңҹ,зӢҖж…Ӣ,зөҗжһң\n";
                const rows = list.map(function(c) { 
                    return c.month + "жңҲ," + c.sales + "," + c.client + ",\"" + c.equipment + "\"," + c.date + "," + c.status + ",\"" + (c.result || "").replace(/\n/g, ' ') + "\""; 
                }).join('\n');
                const blob = new Blob([BOM + header + rows], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "иЁӯеӮҷжЎҲд»¶е ұиЎЁ_" + exportMonth + "жңҲ.csv";
                a.click();
            };

            if (errorMsg) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                <div className="bg-red-500/10 p-8 rounded-3xl border border-red-500/30 max-w-xl shadow-2xl">
                    <AlertTriangle size={64} className="text-red-500 mx-auto mb-4" />
                    <h2 className="text-white text-2xl font-bold mb-4 tracking-wider">вӣ” зі»зөұйҖЈз·ҡз•°еёё</h2>
                    <div className="bg-black/40 p-4 rounded-xl mb-6 text-left border border-white/5">
                    <p className="text-red-300 font-mono text-sm leading-relaxed whitespace-pre-wrap">{errorMsg}</p>
                    </div>
                    <button onClick={function() { window.location.reload(); }} className="w-full bg-red-600 hover:bg-red-500 text-white py-3 rounded-xl font-bold transition-all shadow-lg">йҮҚж–°ијүе…Ҙ</button>
                </div>
                </div>
            );

            if (isLoading) return (
                <div className="min-h-screen flex flex-col items-center justify-center">
                <div className="relative">
                    <Activity className="text-blue-500 animate-spin" size={64} />
                    <Database size={24} className="text-emerald-400 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2" />
                </div>
                <h2 className="text-white mt-8 text-xl font-bold tracking-widest animate-pulse">{cloudStatus}</h2>
                </div>
            );

            if (appMode === 'landing') return (
                <div className="min-h-screen flex items-center justify-center p-4">
                <div className="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-8 animate-in fade-in zoom-in-95 duration-700">
                    <div className="md:col-span-2 text-center mb-4">
                    <div className="inline-flex items-center gap-2 p-3 px-4 bg-emerald-500/10 rounded-full border border-emerald-500/20 mb-6">
                        <Wifi className="text-emerald-400 animate-pulse" size={16} />
                        <span className="text-emerald-400 text-xs font-black tracking-widest uppercase">{cloudStatus}</span>
                    </div>
                    <h1 className="text-4xl md:text-6xl font-black text-white tracking-tighter mb-4">иЁӯеӮҷи©ҰеҒҡз®ЎзҗҶзі»зөұ <span className="text-2xl text-emerald-400 align-top">ver.06</span></h1>
                    <p className="text-slate-400 text-lg md:text-xl font-medium tracking-wide">Vectech Automation Management Portal</p>
                    </div>

                    <PortalCard 
                    icon={<UserCircle size={48} className="text-blue-400" />}
                    title="жҘӯеӢҷдәәе“Ўе…ҘеҸЈ" desc="еҚіжҷӮеӣһе ұи©ҰеҒҡжЎҲд»¶пјҢйӣІз«ҜеҗҢжӯҘ KPI ж•ёж“ҡгҖӮ"
                    onClick={function() { setAppMode('sales'); setActiveTab('form'); }} color="blue"
                    />
                    <PortalCard 
                    icon={<Briefcase size={48} className="text-emerald-400" />}
                    title="з®ЎзҗҶйҡҺеұӨе…ҘеҸЈ" desc="е…Ёж–№дҪҚзёҫж•ҲзңӢжқҝпјҢеҢ…еҗ«е№ҙеәҰзҹ©йҷЈиҲҮ Excel еҢҜеҮәгҖӮ"
                    onClick={function() { setAppMode('manager_auth'); }} color="emerald"
                    />
                </div>
                </div>
            );

            if (appMode === 'manager_auth') return (
                <div className="min-h-screen flex items-center justify-center p-6">
                <div className="bg-white/10 backdrop-blur-xl border border-white/20 p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center animate-in slide-in-from-bottom-8">
                    <Lock className="text-emerald-400 mx-auto mb-6" size={48} />
                    <h2 className="text-white text-3xl font-black mb-2">е®үе…Ёиә«еҲҶй©—иӯү</h2>
                    <p className="text-slate-400 mb-8">и«Ӣијёе…Ҙдё»з®Ўе°Ҳеұ¬иӯҳеҲҘзўј</p>
                    <form onSubmit={handleManagerLogin} className="space-y-6">
                    <input 
                        type="password" value={passwordInput} onChange={function(e) { setPasswordInput(e.target.value); }} placeholder="вҖўвҖўвҖўвҖў" autoFocus
                        className="w-full bg-black/30 border border-white/10 rounded-2xl p-5 text-white text-center text-4xl tracking-[0.5em] outline-none focus:border-emerald-500 transition-all"
                    />
                    {loginError && <p className="text-red-400 font-bold text-sm">иӯҳеҲҘзўјдёҚжӯЈзўә</p>}
                    <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                        й©—иӯүзҷ»е…Ҙ <ArrowRight />
                    </button>
                    <button type="button" onClick={function() { setAppMode('landing'); }} className="text-slate-500 hover:text-white">иҝ”еӣһйҰ–й Ғ</button>
                    </form>
                </div>
                </div>
            );

            const isManager = appMode === 'manager';

            return (
                <div className="min-h-screen bg-[#f8fafc] flex flex-col md:flex-row font-sans">
                <nav className={"w-full md:w-72 text-white flex flex-col shrink-0 z-20 print:hidden transition-colors duration-500 " + (isManager ? "bg-[#0f172a]" : "bg-[#1e3a8a]")}>
                    <div className="p-8 border-b border-white/5 mb-6 flex items-center gap-3">
                    <ShieldCheck className="text-emerald-400" size={28}/>
                    <div>
                        <h1 className="text-xl font-black tracking-tight">Vectech зі»зөұ <span className="text-xs text-blue-300 ml-1">v.06</span></h1>
                    </div>
                    </div>
                    <div className="px-4 space-y-2 flex-1">
                    {isManager ? (
                        <React.Fragment>
                        <SidebarItem active={activeTab === 'dashboard'} icon={<Home/>} label="ж•ёж“ҡзёҪиҰҪ" onClick={function() { setActiveTab('dashboard'); }} />
