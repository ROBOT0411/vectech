<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備試做管理系統 ver.03</title>
    
    <!-- 引入 Tailwind CSS 進行專業排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Phosphor Icons (專業圖示庫) -->
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    
    <!-- 引入 React 核心框架 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Firebase 雲端資料庫模組 -->
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
    
    <!-- 引入 Babel 編譯器 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; }
        .professional-input { width: 100%; padding: 1.25rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1.5rem; outline: none; font-weight: 700; transition: all 0.3s; }
        .professional-input:focus { border-color: #3b82f6; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .professional-select { width: 100%; padding: 1.25rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1.5rem; outline: none; font-weight: 700; cursor: pointer; }
        .hide-scrollbar::-webkit-scrollbar { display: none; } 
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
           @page { margin: 1cm; size: landscape; }
           body * { visibility: hidden; }
           main, main * { visibility: visible; }
           main { position: absolute; left: 0; top: 0; width: 100%; padding: 0 !important; }
           .print\:hidden { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // === React Hooks ===
        const { useState, useMemo, useEffect } = React;

        // === 圖示包裝器 ===
        const Icon = ({ name, size=24, className="" }) => <i className={`ph ${name} ${className}`} style={{ fontSize: size }}></i>;
        const Activity = p => <Icon name="ph-activity" {...p} />;
        const Layers = p => <Icon name="ph-stack" {...p} />;
        const UserCircle = p => <Icon name="ph-user-circle" {...p} />;
        const Briefcase = p => <Icon name="ph-briefcase" {...p} />;
        const Lock = p => <Icon name="ph-lock" {...p} />;
        const ArrowRight = p => <Icon name="ph-arrow-right" {...p} />;
        const ShieldCheck = p => <Icon name="ph-shield-check" {...p} />;
        const FilePlus = p => <Icon name="ph-file-plus" {...p} />;
        const Home = p => <Icon name="ph-house" {...p} />;
        const BarChart3 = p => <Icon name="ph-chart-bar" {...p} />;
        const TrendingUp = p => <Icon name="ph-trend-up" {...p} />;
        const TableIcon = p => <Icon name="ph-table" {...p} />;
        const Settings = p => <Icon name="ph-gear" {...p} />;
        const LogOut = p => <Icon name="ph-sign-out" {...p} />;
        const Database = p => <Icon name="ph-database" {...p} />;
        const Wifi = p => <Icon name="ph-wifi-high" {...p} />;
        const CheckCircle = p => <Icon name="ph-check-circle" {...p} />;
        const CalendarDays = p => <Icon name="ph-calendar-blank" {...p} />;
        const Check = p => <Icon name="ph-check" {...p} />;
        const FileSpreadsheet = p => <Icon name="ph-file-csv" {...p} />;
        const Trash2 = p => <Icon name="ph-trash" {...p} />;
        const AlertTriangle = p => <Icon name="ph-warning" {...p} />;
        const UserPlus = p => <Icon name="ph-user-plus" {...p} />;
        const Printer = p => <Icon name="ph-printer" {...p} />;
        const Target = p => <Icon name="ph-target" {...p} />;
        const KeyRound = p => <Icon name="ph-key" {...p} />;

        // === Firebase 初始化 (您的專屬資料庫) ===
        const firebaseConfig = {
            apiKey: "AIzaSyDrVI2lIVebjunYgIoYOmQp1Kh2kngXzW8",
            authDomain: "robot-ai-d531d.firebaseapp.com",
            projectId: "robot-ai-d531d",
            storageBucket: "robot-ai-d531d.firebasestorage.app",
            messagingSenderId: "499127775198",
            appId: "1:499127775198:web:da8ef20a9a759dc767f74f",
            measurementId: "G-XH8K1GWB5F"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const defaultSalesTargets = { ALSTON: 5, ALEX: 5, CHRIS: 3, HANK: 2 };

        // === 主應用程式 ===
        function App() {
            const [appMode, setAppMode] = useState('landing'); 
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isLoading, setIsLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState('');
            const [cloudStatus, setCloudStatus] = useState('連線中...');

            // 雲端資料
            const [cases, setCases] = useState([]);
            const [salesTargets, setSalesTargets] = useState(defaultSalesTargets);
            const [adminPassword, setAdminPassword] = useState('8888');

            // 本地 UI 狀態
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [newPasswordInput, setNewPasswordInput] = useState('');
            const [newSalesName, setNewSalesName] = useState('');
            const [newSalesTarget, setNewSalesTarget] = useState(3);
            const [showClearConfirm, setShowClearConfirm] = useState(false);
            const [exportMonth, setExportMonth] = useState('all');
            const [viewMonth, setViewMonth] = useState(new Date().getMonth() + 1);

            // 1. 強制直連：繞過所有手機瀏覽器的阻擋，直接抓取資料庫
            useEffect(() => {
                setCloudStatus('讀取資料庫中...');

                // 備用登入（即使失敗也不影響資料庫讀寫）
                auth.signInAnonymously().catch(() => console.log("匿名登入略過，強制使用規則直連"));

                const docRef = db.collection('salesSystem').doc('mainData');
                
                const unsubscribeDB = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        setCases(data.cases || []);
                        setSalesTargets(data.salesTargets || defaultSalesTargets);
                        setAdminPassword(data.adminPassword || '8888');
                    } else {
                        docRef.set({ cases: [], salesTargets: defaultSalesTargets, adminPassword: '8888' });
                    }
                    setCloudStatus('🟢 雲端已同步 (ver.03)');
                    setIsLoading(false);
                }, (err) => {
                    console.error("Listen Error:", err);
                    setErrorMsg(`資料庫存取被拒絕！❌\n請務必到 Firebase -> Firestore Database -> 規則 (Rules)，將程式碼改成 allow read, write: if true;`);
                    setIsLoading(false);
                });

                return () => unsubscribeDB();
            }, []);

            // ☁️ 雲端寫入：強制寫入
            const syncToCloud = async (newData) => {
                setCloudStatus('⏳ 寫入雲端中...');
                try {
                    const docRef = db.collection('salesSystem').doc('mainData');
                    await docRef.set(newData, { merge: true });
                    setCloudStatus('🟢 雲端已同步 (ver.03)');
                    return true;
                } catch (err) {
                    console.error("Write Error:", err);
                    alert(`❌ 寫入失敗！被資料庫阻擋。\n錯誤訊息：${err.message}\n👉 請檢查 Firebase 的「規則 (Rules)」是否已改成 if true;`);
                    setCloudStatus('🔴 寫入失敗');
                    return false;
                }
            };

            // 📊 統計邏輯
            const stats = useMemo(() => {
                const summary = { total: cases.length, tracking: 0, tested: 0, closed: 0 };
                const annualKpiMatrix = {};
                const monthlyTotal = Array(12).fill(0);
                const monthlyStats = {};

                Object.keys(salesTargets).forEach(s => { annualKpiMatrix[s] = Array(12).fill(0); });

                cases.forEach(c => {
                if (c.status === '追蹤中') summary.tracking++;
                if (c.status === '已試做') summary.tested++;
                if (c.status === '已成交') summary.closed++;

                if (c.month >= 1 && c.month <= 12) {
                    monthlyTotal[c.month - 1]++;
                    if ((c.status === '已試做' || c.status === '已成交') && annualKpiMatrix[c.sales]) {
                    annualKpiMatrix[c.sales][c.month - 1]++;
                    }
                }

                if (!monthlyStats[c.month]) {
                    monthlyStats[c.month] = {};
                    Object.keys(salesTargets).forEach(s => monthlyStats[c.month][s] = { total: 0, done: 0 });
                }
                if (monthlyStats[c.month][c.sales]) {
                    monthlyStats[c.month][c.sales].total++;
                    if (c.status === '已試做' || c.status === '已成交') monthlyStats[c.month][c.sales].done++;
                }
                });

                return { summary, annualKpiMatrix, monthlyTotal, monthlyStats };
            }, [cases, salesTargets]);

            // --- 事件處理 ---
            const handleManagerLogin = (e) => {
                e.preventDefault();
                if (passwordInput === adminPassword) {
                setAppMode('manager');
                setActiveTab('dashboard');
                setLoginError(false);
                setPasswordInput('');
                } else {
                setLoginError(true);
                }
            };

            // ⚠️ 手動防呆驗證
            const handleAddCase = async (e) => {
                e.preventDefault();
                try {
                    const fd = new FormData(e.target);
                    const sales = fd.get('sales');
                    const client = fd.get('client')?.trim();
                    const equipment = fd.get('equipment')?.trim();
                    const date = fd.get('date');
                    const status = fd.get('status');

                    if (!sales) return alert('⚠️ 請選擇負責業務！');
                    if (!client) return alert('⚠️ 請輸入客戶名稱！');
                    if (!date) return alert('⚠️ 請選擇試做日期！');
                    if (!equipment) return alert('⚠️ 請輸入設備/產品型號！');

                    const month = parseInt(date.split('-')[1], 10) || new Date().getMonth() + 1;

                    const newCase = {
                        id: cases.length > 0 ? Math.max(...cases.map(c => c.id)) + 1 : 1,
                        sales, client, equipment, date, status,
                        result: fd.get('result') || '',
                        month,
                        createAt: Date.now()
                    };

                    const updatedCases = [...cases, newCase];
                    const isSuccess = await syncToCloud({ cases: updatedCases });
                    
                    if (isSuccess) {
                        e.target.reset();
                        alert('✨ 案件已成功寫入雲端系統！');
                        if (appMode === 'manager') setActiveTab('data');
                    }
                } catch (error) {
                    alert('⚠️ 系統發生錯誤：' + error.message);
                }
            };

            const handleSaveNewPassword = async () => {
                const p = newPasswordInput.trim();
                if (!p) return alert('⚠️ 密碼不能為空白！');
                const isSuccess = await syncToCloud({ adminPassword: p });
                if (isSuccess) {
                setShowSettingsModal(false);
                setNewPasswordInput('');
                alert('✅ 管理密碼已變更，系統將為您登出。');
                setAppMode('manager_auth');
                }
            };

            const handleAddSales = async () => {
                const name = newSalesName.trim().toUpperCase();
                if (!name) return alert('⚠️ 請輸入業務姓名！');
                if (salesTargets[name]) return alert('⚠️ 此業務已存在！');
                const newTargets = { ...salesTargets, [name]: parseInt(newSalesTarget, 10) || 1 };
                
                const isSuccess = await syncToCloud({ salesTargets: newTargets });
                if (isSuccess) {
                setNewSalesName('');
                alert(`✅ 已新增業務：${name}`);
                }
            };

            const handleExportExcel = () => {
                let list = exportMonth === 'all' ? cases : cases.filter(c => c.month === parseInt(exportMonth, 10));
                if (list.length === 0) return alert('此月份無資料可匯出');

                const BOM = '\uFEFF';
                const header = "月份,業務,客戶,設備,日期,狀態,結果\n";
                const rows = list.map(c => `${c.month}月,${c.sales},${c.client},"${c.equipment}",${c.date},${c.status},"${c.result.replace(/\n/g, ' ')}"`).join('\n');
                const blob = new Blob([BOM + header + rows], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `設備案件報表_${exportMonth}月.csv`;
                a.click();
            };

            // --- 介面渲染 ---
            if (errorMsg) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                <div className="bg-red-500/10 p-8 rounded-3xl border border-red-500/30 max-w-xl shadow-2xl">
                    <AlertTriangle size={64} className="text-red-500 mx-auto mb-4" />
                    <h2 className="text-white text-2xl font-bold mb-4 tracking-wider">⛔ 系統連線異常被阻擋</h2>
                    <div className="bg-black/40 p-4 rounded-xl mb-6 text-left border border-white/5">
                    <p className="text-red-300 font-mono text-sm leading-relaxed whitespace-pre-wrap">{errorMsg}</p>
                    </div>
                    <button onClick={() => window.location.reload()} className="w-full bg-red-600 hover:bg-red-500 text-white py-3 rounded-xl font-bold transition-all shadow-lg">我已經修改好了，重新載入</button>
                </div>
                </div>
            );

            if (isLoading) return (
                <div className="min-h-screen flex flex-col items-center justify-center">
                <div className="relative">
                    <Activity className="text-blue-500 animate-spin" size={64} />
                    <Database size={24} className="text-emerald-400 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2" />
                </div>
                <h2 className="text-white mt-8 text-xl font-bold tracking-widest animate-pulse">{cloudStatus}</h2>
                </div>
            );

            // 入口首頁
            if (appMode === 'landing') return (
                <div className="min-h-screen flex items-center justify-center p-4">
                <div className="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-8 animate-in fade-in zoom-in-95 duration-700">
                    <div className="md:col-span-2 text-center mb-4">
                    <div className="inline-flex items-center gap-2 p-3 px-4 bg-emerald-500/10 rounded-full border border-emerald-500/20 mb-6">
                        <Wifi className="text-emerald-400 animate-pulse" size={16} />
                        <span className="text-emerald-400 text-xs font-black tracking-widest uppercase">{cloudStatus}</span>
                    </div>
                    <h1 className="text-4xl md:text-6xl font-black text-white tracking-tighter mb-4">設備試做管理系統 <span className="text-2xl text-emerald-400 align-top">ver.03</span></h1>
                    <p className="text-slate-400 text-lg md:text-xl font-medium tracking-wide">Vectech Automation Management Portal</p>
                    </div>

                    <PortalCard 
                    icon={<UserCircle size={48} className="text-blue-400" />}
                    title="業務人員入口" desc="即時回報試做案件，雲端同步 KPI 數據。"
                    onClick={() => { setAppMode('sales'); setActiveTab('form'); }} color="blue"
                    />
                    <PortalCard 
                    icon={<Briefcase size={48} className="text-emerald-400" />}
                    title="管理階層入口" desc="全方位績效看板，包含年度矩陣與 Excel 匯出。"
                    onClick={() => setAppMode('manager_auth')} color="emerald"
                    />
                </div>
                </div>
            );

            // 主管驗證
            if (appMode === 'manager_auth') return (
                <div className="min-h-screen flex items-center justify-center p-6">
                <div className="bg-white/10 backdrop-blur-xl border border-white/20 p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center animate-in slide-in-from-bottom-8">
                    <Lock className="text-emerald-400 mx-auto mb-6" size={48} />
                    <h2 className="text-white text-3xl font-black mb-2">安全身分驗證</h2>
                    <p className="text-slate-400 mb-8">請輸入主管專屬識別碼</p>
                    <form onSubmit={handleManagerLogin} className="space-y-6">
                    <input 
                        type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="••••" autoFocus
                        className="w-full bg-black/30 border border-white/10 rounded-2xl p-5 text-white text-center text-4xl tracking-[0.5em] outline-none focus:border-emerald-500 transition-all"
                    />
                    {loginError && <p className="text-red-400 font-bold text-sm">識別碼不正確</p>}
                    <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                        驗證登入 <ArrowRight />
                    </button>
                    <button type="button" onClick={() => setAppMode('landing')} className="text-slate-500 hover:text-white">返回首頁</button>
                    </form>
                </div>
                </div>
            );

            const isManager = appMode === 'manager';

            return (
                <div className="min-h-screen bg-[#f8fafc] flex flex-col md:flex-row font-sans">
                {/* 側邊欄 */}
                <nav className={`w-full md:w-72 text-white flex flex-col shrink-0 z-20 ${isManager ? 'bg-[#0f172a]' : 'bg-[#1e3a8a]'} transition-colors duration-500 print:hidden`}>
                    <div className="p-8 border-b border-white/5 mb-6 flex items-center gap-3">
                    <ShieldCheck className="text-emerald-400" size={28}/>
                    <div>
                        <h1 className="text-xl font-black tracking-tight">Vectech 系統 <span className="text-xs text-blue-300 ml-1">v.03</span></h1>
                    </div>
                    </div>
                    <div className="px-4 space-y-2 flex-1">
                    {isManager ? (
                        <>
                        <SidebarItem active={activeTab === 'dashboard'} icon={<Home/>} label="數據總覽" onClick={() => setActiveTab('dashboard')} />
                        <SidebarItem active={activeTab === 'monthly_kpi'} icon={<BarChart3/>} label="當月 KPI 分析" onClick={() => setActiveTab('monthly_kpi')} />
                        <SidebarItem active={activeTab === 'annual_kpi'} icon={<TrendingUp/>} label="年度達標分析" onClick={() => setActiveTab('annual_kpi')} />
                        <SidebarItem active={activeTab === 'data'} icon={<TableIcon/>} label="案件總表匯出" onClick={() => setActiveTab('data')} />
                        <SidebarItem active={activeTab === 'form'} icon={<FilePlus/>} label="新增/補登案件" onClick={() => setActiveTab('form')} />
                        </>
                    ) : (
                        <SidebarItem active={true} icon={<FilePlus/>} label="新增試做案" onClick={() => setActiveTab('form')} />
                    )}
                    </div>
                    <div className="p-4 mt-auto border-t border-white/5 space-y-2">
                    <div className="px-4 py-2 flex items-center gap-2">
                        <span className={`w-2 h-2 rounded-full animate-pulse ${cloudStatus.includes('同步') ? 'bg-emerald-400' : 'bg-amber-400'}`}></span>
                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{cloudStatus}</span>
                    </div>
                    {isManager && (
                        <button onClick={() => setShowSettingsModal(true)} className="w-full flex items-center gap-3 p-4 rounded-2xl hover:bg-white/5 transition-all text-slate-400 hover:text-white font-bold text-sm">
                        <Settings size={18}/> 系統安全設定
                        </button>
                    )}
                    <button onClick={() => {setAppMode('landing'); setPasswordInput('');}} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-all font-bold text-sm">
                        <LogOut size={18}/> 登出
                    </button>
                    </div>
                </nav>

                {/* 主內容區 */}
                <main className="flex-1 overflow-y-auto p-6 md:p-12 print:p-0 print:bg-white text-slate-800">
                    
                    {/* 管理看板 */}
                    {isManager && activeTab === 'dashboard' && (
                    <div className="max-w-6xl mx-auto animate-in fade-in slide-in-from-right-8">
                        <header className="mb-10">
                        <h2 className="text-4xl font-black text-slate-900 mb-2">管理中心</h2>
                        <p className="text-slate-500 font-medium">全公司案件分佈與即時數據分析</p>
                        </header>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                        <StatBox label="總量" value={stats
