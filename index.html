<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>設備試做管理系統 ver.10</title>
    
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.body.innerHTML = '<div style="background:#450a0a; color:#fca5a5; padding:30px; text-align:center; font-family:sans-serif; height:100vh; display:flex; flex-direction:column; justify-content:center;">' +
                '<h2 style="font-size:24px; margin-bottom:15px; font-weight:bold;">⚠️ 系統啟動失敗</h2>' +
                '<p style="margin-bottom:10px; line-height:1.5; font-family:monospace;">' + message + '</p>' +
                '<p style="font-size:12px; opacity:0.7;">請確認記事本存檔時，編碼是否有選擇「UTF-8」。</p>' +
            '</div>';
            return true;
        };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; }
        .professional-input { width: 100%; padding: 1.25rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1.5rem; outline: none; font-weight: 700; transition: all 0.3s; }
        .professional-input:focus { border-color: #3b82f6; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .professional-select { width: 100%; padding: 1.25rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1.5rem; outline: none; font-weight: 700; cursor: pointer; }
        .hide-scrollbar::-webkit-scrollbar { display: none; } 
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
           @page { margin: 1cm; size: landscape; }
           body * { visibility: hidden; }
           main, main * { visibility: visible; }
           main { position: absolute; left: 0; top: 0; width: 100%; padding: 0 !important; }
           .print\:hidden { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size=24, className="" }) => <i className={"ph " + name + " " + className} style={{ fontSize: size }}></i>;
        const Activity = p => <Icon name="ph-activity" {...p} />;
        const Layers = p => <Icon name="ph-stack" {...p} />;
        const UserCircle = p => <Icon name="ph-user-circle" {...p} />;
        const Briefcase = p => <Icon name="ph-briefcase" {...p} />;
        const Lock = p => <Icon name="ph-lock" {...p} />;
        const ArrowRight = p => <Icon name="ph-arrow-right" {...p} />;
        const ShieldCheck = p => <Icon name="ph-shield-check" {...p} />;
        const FilePlus = p => <Icon name="ph-file-plus" {...p} />;
        const Home = p => <Icon name="ph-house" {...p} />;
        const BarChart3 = p => <Icon name="ph-chart-bar" {...p} />;
        const TrendingUp = p => <Icon name="ph-trend-up" {...p} />;
        const TableIcon = p => <Icon name="ph-table" {...p} />;
        const Settings = p => <Icon name="ph-gear" {...p} />;
        const LogOut = p => <Icon name="ph-sign-out" {...p} />;
        const Database = p => <Icon name="ph-database" {...p} />;
        const Wifi = p => <Icon name="ph-wifi-high" {...p} />;
        const CheckCircle = p => <Icon name="ph-check-circle" {...p} />;
        const CalendarDays = p => <Icon name="ph-calendar-blank" {...p} />;
        const Check = p => <Icon name="ph-check" {...p} />;
        const FileSpreadsheet = p => <Icon name="ph-file-csv" {...p} />;
        const Trash2 = p => <Icon name="ph-trash" {...p} />;
        const AlertTriangle = p => <Icon name="ph-warning" {...p} />;
        const UserPlus = p => <Icon name="ph-user-plus" {...p} />;
        const Printer = p => <Icon name="ph-printer" {...p} />;
        const KeyRound = p => <Icon name="ph-key" {...p} />;
        const CloudArrowDown = p => <Icon name="ph-cloud-arrow-down" {...p} />;

        const firebaseConfig = {
            apiKey: "AIzaSyDrVI2lIVebjunYgIoYOmQp1Kh2kngXzW8",
            authDomain: "robot-ai-d531d.firebaseapp.com",
            projectId: "robot-ai-d531d",
            storageBucket: "robot-ai-d531d.firebasestorage.app",
            messagingSenderId: "499127775198",
            appId: "1:499127775198:web:da8ef20a9a759dc767f74f",
            measurementId: "G-XH8K1GWB5F"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 🚀 終極修復：強制手機使用 Long Polling 通訊，解決 Safari/LINE 阻擋 Offline 問題
        db.settings({
            experimentalForceLongPolling: true
        });

        const defaultSalesTargets = { ALSTON: 5, ALEX: 5, CHRIS: 3, HANK: 2 };

        function App() {
            const [appMode, setAppMode] = useState('landing'); 
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isLoading, setIsLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState('');
            const [cloudStatus, setCloudStatus] = useState('連線中...');

            const [cases, setCases] = useState([]);
            const [salesTargets, setSalesTargets] = useState(defaultSalesTargets);
            const [adminPassword, setAdminPassword] = useState('8888');

            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [newPasswordInput, setNewPasswordInput] = useState('');
            const [newSalesName, setNewSalesName] = useState('');
            const [newSalesTarget, setNewSalesTarget] = useState(3);
            const [showClearConfirm, setShowClearConfirm] = useState(false);
            const [exportMonth, setExportMonth] = useState('all');
            const [viewMonth, setViewMonth] = useState(new Date().getMonth() + 1);

            useEffect(() => {
                setCloudStatus('讀取資料庫中...');
                
                // 加強版：如果 API Key 填錯，會立刻報錯
                auth.signInAnonymously().catch(function(err) { 
                    console.log("Auth Warning:", err); 
                    if(err.code === 'auth/invalid-api-key') {
                        setErrorMsg("您的 Firebase 金鑰有誤！請回 Firebase 專案設定重新複製 config。");
                        setIsLoading(false);
                    }
                });

                const docRef = db.collection('salesSystem').doc('mainData');
                
                const unsubscribeDB = docRef.onSnapshot(function(docSnap) {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        setCases(data.cases || []);
                        setSalesTargets(data.salesTargets || defaultSalesTargets);
                        setAdminPassword(data.adminPassword || '8888');
                    } else {
                        setCases([]);
                        setSalesTargets(defaultSalesTargets);
                        setAdminPassword('8888');
                    }
                    setCloudStatus('🟢 雲端已連線 (v10)');
                    setIsLoading(false);
                }, function(err) {
                    console.error("Listen Error:", err);
                    setErrorMsg("資料庫連線失敗，請確認網路狀態。(" + err.message + ")");
                    setIsLoading(false);
                });

                return function() { unsubscribeDB(); };
            }, []);

            const forceRefreshData = function() {
                setIsLoading(true);
                setCloudStatus('強制抓取雲端資料中...');
                const docRef = db.collection('salesSystem').doc('mainData');
                
                docRef.get().then(function(docSnap) {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        setCases(data.cases || []);
                        setSalesTargets(data.salesTargets || defaultSalesTargets);
                        setAdminPassword(data.adminPassword || '8888');
                        alert("✅ 成功！已強制抓取最新資料。");
                    } else {
                        alert("⚠️ 目前雲端資料庫是空的！請先新增一筆資料。");
                    }
                    setCloudStatus('🟢 雲端已連線');
                    setIsLoading(false);
                }).catch(function(err) {
                    console.error("Fetch Error:", err);
                    alert("❌ 抓取失敗：" + err.message);
                    setIsLoading(false);
                });
            };

            const syncToCloud = async function(newData) {
                setCloudStatus('⏳ 寫入中...');
                try {
                    const docRef = db.collection('salesSystem').doc('mainData');
                    await docRef.set(newData, { merge: true });
                    setCloudStatus('🟢 雲端已連線');
                    return true;
                } catch (err) {
                    console.error("Write Error:", err);
                    alert("❌ 寫入失敗！錯誤：" + err.message);
                    setCloudStatus('🔴 寫入失敗');
                    return false;
                }
            };

            const stats = useMemo(function() {
                const summary = { total: cases.length, tracking: 0, tested: 0, closed: 0 };
                const annualKpiMatrix = {};
                const monthlyTotal = Array(12).fill(0);
                const monthlyStats = {};

                Object.keys(salesTargets).forEach(function(s) { annualKpiMatrix[s] = Array(12).fill(0); });

                cases.forEach(function(c) {
                    if (c.status === '追蹤中') summary.tracking++;
                    if (c.status === '已試做') summary.tested++;
                    if (c.status === '已成交') summary.closed++;

                    if (c.month >= 1 && c.month <= 12) {
                        monthlyTotal[c.month - 1]++;
                        if ((c.status === '已試做' || c.status === '已成交') && annualKpiMatrix[c.sales]) {
                            annualKpiMatrix[c.sales][c.month - 1]++;
                        }
                    }

                    if (!monthlyStats[c.month]) {
                        monthlyStats[c.month] = {};
                        Object.keys(salesTargets).forEach(function(s) { monthlyStats[c.month][s] = { total: 0, done: 0 }; });
                    }
                    if (monthlyStats[c.month][c.sales]) {
                        monthlyStats[c.month][c.sales].total++;
                        if (c.status === '已試做' || c.status === '已成交') monthlyStats[c.month][c.sales].done++;
                    }
                });

                return { summary: summary, annualKpiMatrix: annualKpiMatrix, monthlyTotal: monthlyTotal, monthlyStats: monthlyStats };
            }, [cases, salesTargets]);

            const handleManagerLogin = function(e) {
                e.preventDefault();
                if (passwordInput === adminPassword) {
                    setAppMode('manager');
                    setActiveTab('dashboard');
                    setLoginError(false);
                    setPasswordInput('');
                } else {
                    setLoginError(true);
                }
            };

            const handleAddCase = async function(e) {
                e.preventDefault();
                try {
                    const fd = new FormData(e.target);
                    const sales = fd.get('sales');
                    const clientVal = fd.get('client');
                    const equipmentVal = fd.get('equipment');
                    const client = clientVal ? clientVal.trim() : '';
                    const equipment = equipmentVal ? equipmentVal.trim() : '';
                    const date = fd.get('date');
                    const status = fd.get('status');

                    if (!sales) return alert('⚠️ 請選擇負責業務！');
                    if (!client) return alert('⚠️ 請輸入客戶名稱！');
                    if (!date) return alert('⚠️ 請選擇試做日期！');
                    if (!equipment) return alert('⚠️ 請輸入設備/產品型號！');

                    const month = parseInt(date.split('-')[1], 10) || new Date().getMonth() + 1;

                    const newCase = {
                        id: cases.length > 0 ? Math.max.apply(Math, cases.map(function(c) { return c.id; })) + 1 : 1,
                        sales: sales, client: client, equipment: equipment, date: date, status: status,
                        result: fd.get('result') || '',
                        month: month,
                        createAt: Date.now()
                    };

                    const updatedCases = [...cases, newCase];
                    const isSuccess = await syncToCloud({ cases: updatedCases });
                    
                    if (isSuccess) {
                        e.target.reset();
                        alert('✨ 案件已成功寫入雲端！');
                        if (appMode === 'manager') setActiveTab('data');
                    }
                } catch (error) {
                    alert('⚠️ 系統錯誤：' + error.message);
                }
            };

            const handleSaveNewPassword = async function() {
                const p = newPasswordInput.trim();
                if (!p) return alert('⚠️ 密碼不能為空白！');
                const isSuccess = await syncToCloud({ adminPassword: p });
                if (isSuccess) {
                    setShowSettingsModal(false);
                    setNewPasswordInput('');
                    alert('✅ 密碼已變更，請重新登入。');
                    setAppMode('manager_auth');
                }
            };

            const handleAddSales = async function() {
                const name = newSalesName.trim().toUpperCase();
                if (!name) return alert('⚠️ 請輸入姓名！');
                if (salesTargets[name]) return alert('⚠️ 業務已存在！');
                const newTargets = Object.assign({}, salesTargets);
                newTargets[name] = parseInt(newSalesTarget, 10) || 1;
                
                const isSuccess = await syncToCloud({ salesTargets: newTargets });
                if (isSuccess) {
                    setNewSalesName('');
                    alert("✅ 已新增業務：" + name);
                }
            };

            const handleExportExcel = function() {
                let list = exportMonth === 'all' ? cases : cases.filter(function(c) { return c.month === parseInt(exportMonth, 10); });
                if (list.length === 0) return alert('無資料可匯出');

                const BOM = '\uFEFF';
                const header = "月份,業務,客戶,設備,日期,狀態,結果\n";
                const rows = list.map(function(c) { 
                    return c.month + "月," + c.sales + "," + c.client + ",\"" + c.equipment + "\"," + c.date + "," + c.status + ",\"" + (c.result || "").replace(/\n/g, ' ') + "\""; 
                }).join('\n');
                const blob = new Blob([BOM + header + rows], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "案件報表_" + exportMonth + "月.csv";
                a.click();
            };

            if (errorMsg) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    <div className="bg-red-500/10 p-8 rounded-3xl border border-red-500/30 max-w-xl shadow-2xl">
                        <AlertTriangle size={64} className="text-red-500 mx-auto mb-4" />
                        <h2 className="text-white text-2xl font-bold mb-4">⛔ 系統連線異常</h2>
                        <div className="bg-black/40 p-4 rounded-xl mb-6 text-left border border-white/5">
                            <p className="text-red-300 font-mono text-sm whitespace-pre-wrap">{errorMsg}</p>
                        </div>
                        <button onClick={function() { window.location.reload(); }} className="w-full bg-red-600 hover:bg-red-500 text-white py-3 rounded-xl font-bold">重新載入</button>
                    </div>
                </div>
            );

            if (isLoading) return (
                <div className="min-h-screen flex flex-col items-center justify-center">
                    <div className="relative">
                        <Activity className="text-blue-500 animate-spin" size={64} />
                        <Database size={24} className="text-emerald-400 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2" />
                    </div>
                    <h2 className="text-white mt-8 text-xl font-bold tracking-widest animate-pulse">{cloudStatus}</h2>
                </div>
            );

            if (appMode === 'landing') return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-8 animate-in fade-in zoom-in-95 duration-700">
                        <div className="md:col-span-2 text-center mb-4">
                            <div className="inline-flex items-center gap-2 p-3 px-4 bg-emerald-500/10 rounded-full border border-emerald-500/20 mb-6">
                                <Wifi className="text-emerald-400 animate-pulse" size={16} />
                                <span className="text-emerald-400 text-xs font-black tracking-widest uppercase">{cloudStatus}</span>
                            </div>
                            <h1 className="text-4xl md:text-6xl font-black text-white tracking-tighter mb-4">設備試做管理系統 <span className="text-2xl text-emerald-400 align-top">v10</span></h1>
                            <p className="text-slate-400 text-lg md:text-xl font-medium tracking-wide">Vectech Automation Management</p>
                        </div>

                        <PortalCard 
                            icon={<UserCircle size={48} className="text-blue-400" />}
                            title="業務人員入口" desc="即時回報試做案件，雲端同步。"
                            onClick={function() { setAppMode('sales'); setActiveTab('form'); }} color="blue"
                        />
                        <PortalCard 
                            icon={<Briefcase size={48} className="text-emerald-400" />}
                            title="管理階層入口" desc="全方位績效看板與 Excel 匯出。"
                            onClick={function() { setAppMode('manager_auth'); }} color="emerald"
                        />
                    </div>
                </div>
            );

            if (appMode === 'manager_auth') return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="bg-white/10 backdrop-blur-xl border border-white/20 p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center animate-in slide-in-from-bottom-8">
                        <Lock className="text-emerald-400 mx-auto mb-6" size={48} />
                        <h2 className="text-white text-3xl font-black mb-2">安全身分驗證</h2>
                        <p className="text-slate-400 mb-8">請輸入主管專屬識別碼</p>
                        <form onSubmit={handleManagerLogin} className="space-y-6">
                            <input 
                                type="password" value={passwordInput} onChange={function(e) { setPasswordInput(e.target.value); }} placeholder="••••" autoFocus
                                className="w-full bg-black/30 border border-white/10 rounded-2xl p-5 text-white text-center text-4xl tracking-[0.5em] outline-none focus:border-emerald-500 transition-all"
                            />
                            {loginError && <p className="text-red-400 font-bold text-sm">識別碼不正確</p>}
                            <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                                驗證登入 <ArrowRight />
                            </button>
                            <button type="button" onClick={function() { setAppMode('landing'); }} className="text-slate-500 hover:text-white">返回首頁</button>
                        </form>
                    </div>
                </div>
            );

            const isManager = appMode === 'manager';

            return (
                <div className="min-h-screen bg-[#f8fafc] flex flex-col md:flex-row font-sans">
                    <nav className={"w-full md:w-72 text-white flex flex-col shrink-0 z-20 print:hidden transition-colors duration-500 " + (isManager ? "bg-[#0f172a]" : "bg-[#1e3a8a]")}>
                        <div className="p-8 border-b border-white/5 mb-6 flex items-center gap-3">
                            <ShieldCheck className="text-emerald-400" size={28}/>
                            <div><h1 className="text-xl font-black tracking-tight">Vectech 系統 <span className="text-xs text-blue-300 ml-1">v.10</span></h1></div>
                        </div>
                        <div className="px-4 space-y-2 flex-1">
                            {isManager ? (
                                <React.Fragment>
                                    <SidebarItem active={activeTab === 'dashboard'} icon={<Home/>} label="數據總覽" onClick={function() { setActiveTab('dashboard'); }} />
                                    <SidebarItem active={activeTab === 'monthly_kpi'} icon={<BarChart3/>} label="當月 KPI 分析" onClick={function() { setActiveTab('monthly_kpi'); }} />
                                    <SidebarItem active={activeTab === 'annual_kpi'} icon={<TrendingUp/>} label="年度達標分析" onClick={function() { setActiveTab('annual_kpi'); }} />
                                    <SidebarItem active={activeTab === 'data'} icon={<TableIcon/>} label="案件總表匯出" onClick={function() { setActiveTab('data'); }} />
                                    <SidebarItem active={activeTab === 'form'} icon={<FilePlus/>} label="新增/補登案件" onClick={function() { setActiveTab('form'); }} />
                                </React.Fragment>
                            ) : (
                                <SidebarItem active={true} icon={<FilePlus/>} label="新增試做案" onClick={function() { setActiveTab('form'); }} />
                            )}
                        </div>
                        <div className="p-4 mt-auto border-t border-white/5 space-y-2">
                            <button onClick={forceRefreshData} className="w-full flex items-center justify-center gap-2 p-3 rounded-xl bg-blue-500/20 text-blue-300 hover:bg-blue-500/30 transition-all font-bold text-sm mb-4 border border-blue-500/30 shadow-lg">
                                <CloudArrowDown size={18}/> 強制從雲端抓取更新
                            </button>
                            <div className="px-4 py-2 flex items-center gap-2">
                                <span className={"w-2 h-2 rounded-full animate-pulse " + (cloudStatus.indexOf('同步') !== -1 || cloudStatus.indexOf('連線') !== -1 ? 'bg-emerald-400' : 'bg-amber-400')}></span>
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{cloudStatus}</span>
                            </div>
                            {isManager && (
                                <button onClick={function() { setShowSettingsModal(true); }} className="w-full flex items-center gap-3 p-4 rounded-2xl hover:bg-white/5 transition-all text-slate-400 hover:text-white font-bold text-sm">
                                    <Settings size={18}/> 系統安全設定
                                </button>
                            )}
                            <button onClick={function() { setAppMode('landing'); setPasswordInput(''); }} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-all font-bold text-sm">
                                <LogOut size={18}/> 登出
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto p-6 md:p-12 print:p-0 print:bg-white text-slate-800">
                        
                        {isManager && activeTab === 'dashboard' && (
                            <div className="max-w-6xl mx-auto animate-in fade-in slide-in-from-right-8">
                                <header className="mb-10">
                                    <h2 className="text-4xl font-black text-slate-900 mb-2">管理中心</h2>
                                    <p className="text-slate-500 font-medium">全公司案件分佈與即時數據分析</p>
                                </header>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                                    <StatBox label="總量" value={stats.summary.total} color="slate" />
                                    <StatBox label="追蹤" value={stats.summary.tracking} color="amber" />
                                    <StatBox label="試做" value={stats.summary.tested} color="blue" />
                                    <StatBox label="成交" value={stats.summary.closed} color="emerald" />
                                </div>
                                <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                                    <h3 className="text-xl font-bold mb-6 flex items-center gap-2"><Activity className="text-blue-500"/> 各業務案件貢獻度</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">
                                        {Object.keys(salesTargets).map(function(s) {
                                            const count = cases.filter(function(c) { return c.sales === s; }).length;
                                            const pct = cases.length ? (count / cases.length) * 100 : 0;
                                            return (
                                                <div key={s}>
                                                    <div className="flex justify-between text-sm font-bold mb-2"><span>{s}</span><span>{count} 件</span></div>
                                                    <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                                        <div className="h-full bg-blue-500 transition-all duration-1000" style={{ width: pct + "%" }}></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {((!isManager) || (isManager && activeTab === 'form')) && (
                            <div className="max-w-3xl mx-auto animate-in slide-in-from-bottom-8">
                                <header className="text-center mb-10">
                                    <h2 className={"text-4xl font-black mb-4 " + (isManager ? "text-emerald-900" : "text-blue-900")}>新增試做案</h2>
                                    <p className="text-slate-500 font-medium">同步儲存於雲端，主管端可即時查看</p>
                                </header>
                                <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-t-[12px] border-blue-600">
                                    <form onSubmit={handleAddCase} className="space-y-8">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="space-y-3">
                                                <label className="text-sm font-black text-slate-700">負責業務 *</label>
                                                <select name="sales" className="professional-select">
                                                    <option value="">選擇人員</option>
                                                    {Object.keys(salesTargets).map(function(n) { return <option key={n} value={n}>{n}</option>; })}
                                                </select>
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-sm font-black text-slate-700">案件狀態 *</label>
                                                <select name="status" className="professional-select">
                                                    <option value="追蹤中">🟡 追蹤中</option>
                                                    <option value="已試做">🔵 已試做 (計入KPI)</option>
                                                    <option value="已成交">🟢 已成交 (計入KPI)</option>
                                                </select>
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-sm font-black text-slate-700">客戶名稱 *</label>
                                                <input name="client" className="professional-input" placeholder="公司名稱" />
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-sm font-black text-slate-700">日期 *</label>
                                                <input name="date" type="date" className="professional-input" />
                                            </div>
                                            <div className="md:col-span-2 space-y-3">
                                                <label className="text-sm font-black text-slate-700">設備/產品型號 *</label>
                                                <input name="equipment" className="professional-input" placeholder="例如: RV-ET9484E, WS25" />
                                            </div>
                                            <div className="md:col-span-2 space-y-3">
                                                <label className="text-sm font-black text-slate-700">結果備註</label>
                                                <textarea name="result" rows="4" className="professional-input resize-none" placeholder="輸入詳細進度..." />
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white py-6 rounded-3xl font-black text-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3 cursor-pointer">
                                            寫入雲端資料庫 <Database />
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {isManager && activeTab === 'monthly_kpi' && (
                            <div className="max-w-5xl mx-auto animate-in fade-in">
                                <div className="flex justify-between items-end mb-10">
                                    <div>
                                        <h2 className="text-3xl font-black text-slate-900 mb-2">當月 KPI 統計分析</h2>
                                        <p className="text-slate-500 font-medium">即時分析各業務當月目標與實際達成狀況</p>
                                    </div>
                                    <div className="flex items-center gap-4 print:hidden">
                                        <select value={viewMonth} onChange={function(e) { setViewMonth(Number(e.target.value)); }} className="bg-white border-2 border-slate-200 rounded-[1rem] px-5 py-3 font-bold outline-none cursor-pointer hover:border-blue-400 transition-colors">
                                            {[...Array(12)].map(function(_, i) { return <option key={i} value={i+1}>{i+1} 月份</option>; })}
                                        </select>
                                        <button onClick={function() { window.print(); }} className="bg-slate-900 text-white px-6 py-3.5 rounded-[1rem] font-bold flex items-center gap-2 hover:bg-slate-800 transition-all shadow-md">
                                            <Printer size={18}/> 列印
                                        </button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {Object.keys(salesTargets).map(function(sales) {
                                        const target = salesTargets[sales];
                                        const monthData = stats.monthlyStats[viewMonth] && stats.monthlyStats[viewMonth][sales] ? stats.monthlyStats[viewMonth][sales] : { total: 0, done: 0 };
                                        const current = monthData.done;
                                        const rate = target > 0 ? Math.min(100, (current / target) * 100) : 0;
                                        const isSuccess = current >= target;

                                        return (
                                            <div key={sales} className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 relative overflow-hidden transition-all hover:shadow-md">
                                                <div className="flex justify-between items-center mb-6">
                                                    <span className="text-2xl font-black text-slate-800">{sales}</span>
                                                    {isSuccess ? 
                                                        <span className="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-sm font-black flex items-center gap-1"><Check size={16}/> 達標</span> : 
                                                        <span className="bg-amber-100 text-amber-700 px-4 py-1.5 rounded-full text-sm font-black">未達標</span>
                                                    }
                                                </div>
                                                <div className="flex justify-between text-base mb-3 font-black text-slate-600">
                                                    <span>進度: <span className="text-blue-600">{current}</span> / {target} 件</span>
                                                    <span className={isSuccess ? "text-emerald-600" : "text-slate-800"}>{rate.toFixed(0)}%</span>
                                                </div>
                                                <div className="w-full bg-slate-100 rounded-full h-5 overflow-hidden">
                                                    <div className={"h-full rounded-full transition-all duration-1000 " + (isSuccess ? "bg-emerald-500" : "bg-blue-500")} style={{ width: rate + "%" }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {isManager && activeTab === 'annual_kpi' && (
                            <div className="max-w-[1200px] mx-auto animate-in fade-in duration-500">
                                <header className="flex justify-between items-center mb-10">
                                    <div>
                                        <h2 className="text-3xl font-black text-slate-900">年度績效矩陣</h2>
                                        <p className="text-slate-500 font-medium">全年度 1-12 月各業務「已試做/已成交」達標概況</p>
                                    </div>
                                    <button onClick={function() { window.print(); }} className="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2 hover:bg-slate-800 transition-all print:hidden">
                                        <Printer size={18}/> 列印
                                    </button>
                                </header>
                                <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100 overflow-x-auto">
                                    <table className="w-full text-center border-separate border-spacing-2 min-w-[900px]">
                                        <thead>
                                            <tr>
                                                <th className="p-4 text-left font-black text-slate-400 text-xs">業務</th>
                                                {[...Array(12)].map(function(_, i) { return <th key={i} className="p-4 font-black text-lg">{i+1}月</th>; })}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {Object.keys(salesTargets).map(function(s) {
                                                return (
                                                    <tr key={s}>
                                                        <td className="p-4 text-left font-black text-xl border-r">
                                                            {s}
                                                            <div className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-tighter">目標 {salesTargets[s]} 件/月</div>
                                                        </td>
                                                        {stats.annualKpiMatrix[s].map(function(val, idx) {
                                                            const target = salesTargets[s];
                                                            const isDone = val >= target;
                                                            return (
                                                                <td key={idx} className="p-4">
                                                                    {isDone ? (
                                                                        <div className="w-10 h-10 bg-emerald-500 text-white rounded-xl flex items-center justify-center mx-auto shadow-lg shadow-emerald-500/20"><Check size={20}/></div>
                                                                    ) : val > 0 ? (
                                                                        <div className="w-10 h-10 bg-amber-50 text-amber-600 border border-amber-200 rounded-xl flex items-center justify-center mx-auto font-black text-xs">{val}</div>
                                                                    ) : <div className="text-slate-200">-</div>}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {isManager && activeTab === 'data' && (
                            <div className="max-w-6xl mx-auto animate-in fade-in">
                                <div className="flex justify-between items-end mb-10">
                                    <div>
                                        <h2 className="text-3xl font-black">雲端案件清單</h2>
                                        <p className="text-slate-500 font-medium">即時顯示所有儲存於 Firebase 的歷史紀錄</p>
                                    </div>
                                    <div className="flex items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border border-slate-100 print:hidden">
                                        <select value={exportMonth} onChange={function(e) { setExportMonth(e.target.value); }} className="bg-transparent font-bold outline-none cursor-pointer">
                                            <option value="all">全年度</option>
                                            {[...Array(12)].map(function(_, i) { return <option key={i} value={i+1}>{i+1}月</option>; })}
                                        </select>
                                        <button onClick={handleExportExcel} className="bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-emerald-500">
                                            <FileSpreadsheet size={18}/> 匯出 Excel
                                        </button>
                                    </div>
                                </div>
                                <div className="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-900 text-white text-xs font-black uppercase tracking-widest">
                                            <tr>
                                                <th className="p-6">月份</th>
                                                <th className="p-6">業務</th>
                                                <th className="p-6">客戶</th>
                                                <th className="p-6">狀態</th>
                                                <th className="p-6">型號</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {cases.slice().reverse().map(function(c) {
                                                return (
                                                    <tr key={c.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                        <td className="p-6 font-bold text-blue-600">{c.month}月</td>
                                                        <td className="p-6 font-black text-slate-700">{c.sales}</td>
                                                        <td className="p-6 font-medium">{c.client}</td>
                                                        <td className="p-6">
                                                            <span className={"px-4 py-1.5 rounded-full text-[10px] font-black " + (c.status === "已成交" ? "bg-emerald-100 text-emerald-700" : c.status === "已試做" ? "bg-blue-100 text-blue-700" : "bg-amber-100 text-amber-700")}>{c.status}</span>
                                                        </td>
                                                        <td className="p-6 text-slate-400 text-sm truncate max-w-[200px]">{c.equipment}</td>
                                                    </tr>
                                                );
                                            })}
                                            {cases.length === 0 && <tr><td colSpan="5" className="p-20 text-center text-slate-300 font-bold">目前無雲端紀錄</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="mt-8 flex justify-end print:hidden">
                                    <button onClick={function() { setShowClearConfirm(true); }} className="text-red-400 hover:text-red-600 font-bold text-sm flex items-center gap-1"><Trash2 size={16}/> 清空資料庫</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-6 animate-in fade-in print:hidden">
                            <div className="bg-white rounded-[3rem] shadow-2xl w-full max-w-lg p-10">
                                <h3 className="text-3xl font-black mb-8 flex items-center gap-3"><Settings className="text-emerald-500" /> 系統設定</h3>
                                <div className="space-y-8">
                                    <div>
                                        <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">修改管理密碼</p>
                                        <div className="flex gap-3">
                                            <input type="text" value={newPasswordInput} onChange={function(e) { setNewPasswordInput(e.target.value); }} placeholder="新識別碼" className="flex-1 bg-slate-100 p-4 rounded-2xl outline-none font-bold" />
                                            <button onClick={handleSaveNewPassword} className="bg-emerald-600 text-white px-6 rounded-2xl font-black">更新</button>
                                        </div>
                                    </div>
                                    <div>
                                        <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">團隊管理</p>
                                        <div className="grid grid-cols-2 gap-3 mb-3">
                                            <input value={newSalesName} onChange={function(e) { setNewSalesName(e.target.value); }} placeholder="姓名" className="bg-slate-100 p-4 rounded-2xl outline-none font-bold" />
                                            <input type="number" value={newSalesTarget} onChange={function(e) { setNewSalesTarget(e.target.value); }} placeholder="KPI" className="bg-slate-100 p-4 rounded-2xl outline-none font-bold" />
                                        </div>
                                        <button onClick={handleAddSales} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2"><UserPlus size={18}/> 新增人員</button>
                                    </div>
                                </div>
                                <button onClick={function() { setShowSettingsModal(false); }} className="mt-10 w-full text-slate-400 font-bold hover:text-slate-800 transition-colors">關閉視窗</button>
                            </div>
                        </div>
                    )}

                    {showClearConfirm && (
                        <div className="fixed inset-0 bg-red-900/60 backdrop-blur-md z-[200] flex items-center justify-center p-6 animate-in fade-in print:hidden">
                            <div className="bg-white p-12 rounded-[3rem] shadow-2xl text-center">
                                <AlertTriangle size={64} className="text-red-600 mx-auto mb-6" />
                                <h3 className="text-2xl font-black mb-4">確定清空雲端資料嗎？</h3>
                                <p className="text-slate-500 mb-8 font-medium">這將同步刪除所有裝置上的歷史紀錄，<span className="text-red-500 font-bold">無法復原！</span></p>
                                <div className="flex gap-4">
                                    <button onClick={function() { setShowClearConfirm(false); }} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">取消</button>
                                    <button onClick={async function() { await syncToCloud({ cases: [] }); setShowClearConfirm(false); }} className="flex-1 py-4 bg-red-600 text-white rounded-2xl font-black shadow-lg">清空</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function SidebarItem({ active, icon, label, onClick }) {
            return (
                <button onClick={onClick} className={"w-full flex items-center gap-4 p-4 rounded-2xl transition-all font-black text-sm " + (active ? "bg-white text-slate-900 shadow-xl shadow-black/20 translate-x-2" : "hover:bg-white/5 text-slate-400 hover:text-white")}>
                    {icon} {label}
                </button>
            );
        }

        function PortalCard({ icon, title, desc, onClick, color }) {
            return (
                <button onClick={onClick} className="group bg-white/5 border border-white/10 p-10 rounded-[3rem] text-left transition-all duration-500 hover:bg-white/10">
                    <div className="mb-6 transform transition-transform group-hover:scale-110 duration-500">{icon}</div>
                    <h2 className="text-3xl font-black text-white mb-4">{title}</h2>
                    <p className="text-slate-500 leading-relaxed font-medium">{desc}</p>
                    <div className="mt-8 flex items-center gap-2 text-sm font-black text-white opacity-0 group-hover:opacity-100 transition-opacity">立即進入 <ArrowRight size={16} /></div>
                </button>
            );
        }

        function StatBox({ label, value, color }) {
            const colors = { slate: "text-slate-900 bg-slate-100", amber: "text-amber-600 bg-amber-50", blue: "text-blue-600 bg-blue-50", emerald: "text-emerald-600 bg-emerald-50" };
            return (
                <div className={"p-8 rounded-[2rem] border border-slate-100 shadow-sm " + colors[color || "slate"]}>
                    <p className="text-xs font-black uppercase opacity-60 mb-2">{label}</p>
                    <p className="text-4xl font-black">{value}</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
